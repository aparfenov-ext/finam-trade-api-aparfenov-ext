name: Python SDK Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'python/**'
      - 'proto/**'
      - '.github/workflows/python_test.yml'
  pull_request:
    paths:
      - 'python/**'
      - 'proto/**'
      - '.github/workflows/python_test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Regenerate proto stubs
        run: ./scripts/generate_proto.sh

      # The proto stubs are committed to the repo so end users don't need
      # protoc. CI regenerates them on every run and fails if the result
      # differs from what's committed — catches contributors who edited
      # a .proto without re-running the generator.
      - name: Verify committed stubs match regenerated output
        run: |
          if ! git diff --quiet finam_trade_api/proto/; then
            echo "::error::Committed proto stubs are stale. Run 'cd python && ./scripts/generate_proto.sh' and commit the result."
            git diff --stat finam_trade_api/proto/
            exit 1
          fi

      - name: Lint with ruff
        # Warn-only for the first releases — tighten to `ruff check` once
        # the pre-existing warnings have been triaged.
        continue-on-error: true
        run: ruff check finam_trade_api/ examples/ tests/

      - name: Type-check with pyright
        # Same rationale as ruff. Run only on the latest matrix version to
        # avoid noise from version-specific typeshed differences.
        if: matrix.python-version == '3.13'
        continue-on-error: true
        run: |
          pip install pyright
          pyright finam_trade_api/ examples/

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=95

      - name: Smoke-import examples
        # Catches example bitrot — e.g. an imported message that no longer
        # exists, or a stale call signature. Examples need env vars at run
        # time but should import cleanly without them.
        env:
          FINAM_SECRET: ''
          FINAM_ACCOUNT_ID: ''
        run: |
          for f in examples/*.py; do
            python -c "
          import ast, sys
          src = open('$f').read()
          ast.parse(src)  # syntax
          # Replace the __main__ guard execution by parsing only; importing
          # the module file would try to read env vars at import time. Some
          # examples do that (auth_and_account.py uses os.environ['FINAM_SECRET']
          # inside main()), so the AST parse is the right level of smoke test.
          print('OK:', '$f')
          "
          done

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: python/coverage.xml

  build:
    # Verifies the package builds, the wheel/sdist are well-formed, and the
    # metadata is publishable. Runs once (not across the matrix) — packaging
    # output doesn't depend on the Python version used to build it.
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      # Need the generated stubs in place because they're shipped in the
      # wheel. We don't verify-no-diff here — the `test` job already did.
      - name: Install package (for proto generation)
        run: pip install -e ".[dev]"

      - name: Regenerate proto stubs
        run: ./scripts/generate_proto.sh

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        # `twine check` catches issues PyPI would reject — bad README rendering,
        # missing classifiers, malformed license fields, etc.
        run: twine check --strict dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*
          # Retained so the publish workflow (Phase 3) can download and
          # upload exactly what CI tested, instead of rebuilding.
          retention-days: 30
