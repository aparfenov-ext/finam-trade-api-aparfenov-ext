name: Publish Python SDK to PyPI

# Triggered when a GitHub Release is published. Tags are bare versions,
# unified across all SDKs (a legacy v-prefix is also accepted). The marker
# in the tag determines the target index:
#   2.16.0          → real PyPI
#   2.16.0a1, rc1, … → TestPyPI (any tag containing a/b/rc/dev marker)
#
# Authentication uses PyPI trusted publishing (OIDC) — no API tokens are
# stored as repo secrets. Both PyPI and TestPyPI need a one-time trusted
# publisher configured on the project page; see python/RELEASING.md.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    outputs:
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Verify tag matches pyproject version
        # Catches the common mistake of cutting a v0.1.1 release without
        # bumping the version in pyproject.toml — PyPI would reject the
        # upload but only after the publish job ran, wasting minutes and
        # leaving the release in a half-cut state.
        run: |
          git fetch --tags
          TAG="${git describe --tags --exact-match HEAD 2>/dev/null || echo ""}"
          # Release tags are bare versions (e.g. 2.16.0), unified across all
          # SDKs. A legacy v-prefix is tolerated so v2.16.0 also resolves.
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG (version $TAG_VERSION) does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Tag and pyproject version agree: $PYPROJECT_VERSION"

      - name: Classify release (prerelease → TestPyPI, final → PyPI)
        id: classify
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # PEP 440 prerelease markers: aN, bN, rcN, devN, .devN (case-insensitive).
          if echo "$TAG" | grep -Eiq '(a|b|rc|dev)[0-9]+'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a prerelease — will publish to TestPyPI"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a final release — will publish to real PyPI"
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Install package (for proto generation)
        run: pip install -e ".[dev]"

      - name: Regenerate proto stubs
        run: ./scripts/generate_proto.sh

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check --strict dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/*
          retention-days: 30

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: needs.build.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest

    environment:
      # `testpypi` environment must exist in repo Settings → Environments.
      # Trusted publisher on test.pypi.org must reference this environment.
      name: testpypi
      url: https://test.pypi.org/project/finam-sdk/

    permissions:
      # Required for trusted publishing OIDC token issuance.
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest

    environment:
      # `pypi` environment must exist in repo Settings → Environments.
      # Trusted publisher on pypi.org must reference this environment.
      # Strongly recommended to require manual approval on this environment.
      name: pypi
      url: https://pypi.org/project/finam-sdk/

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
